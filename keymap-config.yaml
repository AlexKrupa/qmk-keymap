# Friendly labels for custom keycodes that keymap-drawer can't auto-detect.
parse_config:
  preprocess: true
  skip_binding_parsing: false
  sticky_label: sticky
  toggle_label: $$mdi:toggle-switch$$
  trans_legend:
    t: ▽
    type: trans
  layer_names:
    - BASE
    - NUM
    - SYM
    - NAV
    - MOUSE
    - SYSTEM
  raw_binding_map:
    # Thumbs: LT() layer-tap, hold = layer, tap = key
    TMB_BSP: { t: "$$mdi:backspace$$", h: "NAV" }
    TMB_ESC: { t: "$$mdi:keyboard-esc$$", h: "NUM" }
    TMB_ENT: { t: "$$mdi:keyboard-return$$", h: "SYM" }
    TMB_SPC: { t: "$$mdi:keyboard-space$$", h: "MOUSE" }
    # Dual-function numpad keys: tap = digit/symbol, hold = F-key
    # (LT() layer placeholders are overridden in process_record_user)
    DF_0_F11: { t: "0", h: F11 }
    DF_1_F1: { t: "1", h: F1 }
    DF_2_F2: { t: "2", h: F2 }
    DF_3_F3: { t: "3", h: F3 }
    DF_4_F4: { t: "4", h: F4 }
    DF_5_F5: { t: "5", h: F5 }
    DF_6_F6: { t: "6", h: F6 }
    DF_7_F7: { t: "7", h: F7 }
    DF_8_F8: { t: "8", h: F8 }
    DF_9_F9: { t: "9", h: F9 }
    DF_ASTR_F12: { t: "*", h: F12 }
    DF_SLS_F10: { t: "/", h: F10 }
    # Layer 1 mod-taps: modifier on hold, macOS shortcut on tap
    MT_GUI_SA: { t: "$$mdi:select-all$$", h: "$$mdi:apple-keyboard-command$$" }
    MT_ALT_DL: { t: "$$mdi:delete$$", h: "$$mdi:apple-keyboard-option$$" }
    MT_SFT_FD: { t: "$$mdi:file-find$$", h: "$$mdi:apple-keyboard-shift$$" }
    # Home-row mods (HRM)
    HRM_A: { t: "A", h: "$$mdi:apple-keyboard-command$$" }
    HRM_S: { t: "S", h: "$$mdi:apple-keyboard-control$$" }
    HRM_D: { t: "D", h: "$$mdi:apple-keyboard-option$$" }
    HRM_F: { t: "F", h: "$$mdi:apple-keyboard-shift$$" }
    HRM_J: { t: "J", h: "$$mdi:apple-keyboard-shift$$" }
    HRM_K: { t: "K", h: "$$mdi:apple-keyboard-option$$" }
    HRM_L: { t: "L", h: "$$mdi:apple-keyboard-control$$" }
    HRM_QUO: { t: "'", s: '"', h: "$$mdi:apple-keyboard-command$$" }
    # Bottom-row mods (BRM)
    BRM_Z: { t: "Z", h: "$$mdi:star-four-points$$" }
    BRM_X: { t: "X", h: "$$mdi:star-three-points$$" }
    BRM_C: { t: "C", h: "R⌥" }
    BRM_V: { t: "V", h: "SYM" }
    BRM_M: { t: "M", h: "SYM" }
    BRM_COM: { t: ",", s: ";", h: "R⌥" }
    BRM_DOT: { t: ".", s: ":", h: "$$mdi:star-three-points$$" }
    BRM_SLS: { t: "/", s: "?", h: "$$mdi:star-four-points$$" }
    BRM_ASTR: { t: "*", s: "!", h: "SYSTEM" }
    # Plain modifiers (used on NUM layer)
    KC_LEFT_CTRL: "$$mdi:apple-keyboard-control$$"
    KC_LEFT_GUI: "$$mdi:apple-keyboard-command$$"
    KC_LEFT_ALT: "$$mdi:apple-keyboard-option$$"
    KC_LEFT_SHIFT: "$$mdi:apple-keyboard-shift$$"
    KC_RIGHT_CTRL: "$$mdi:apple-keyboard-control$$"
    KC_RIGHT_GUI: "$$mdi:apple-keyboard-command$$"
    KC_RIGHT_ALT: "R⌥"
    KC_RIGHT_SHIFT: "$$mdi:apple-keyboard-shift$$"
    # Text macros
    MCR_ARR: "-> "
    MCR_DLR_BRC: "${}"
    MCR_HOME: "~/"
    MCR_MDCODE: "```\n\n```"
    MCR_VQ: ":q!"
    MCR_VW: ":w"
    MCR_VWQ: ":wq"
    # macOS shortcut aliases
    SEL_ALL: "$$mdi:form-textarea$$"
    MAC_FIND: "$$mdi:file-find$$"
    MAC_QUIT: "$$mdi:close-box-multiple$$"
    MAC_DEL: "$$mdi:delete$$"
    CYCLOTAB: "$$mdi:swap-horizontal$$"
    TAB_OPN: "$$mdi:tab$$"
    TAB_CLS: "$$mdi:tab-remove$$"
    TAB_PRV: "$$mdi:tab-minus$$"
    TAB_NXT: "$$mdi:tab-plus$$"
    KC_MAC_UNDO: "$$mdi:undo$$"
    KC_MAC_CUT: "$$mdi:content-cut$$"
    KC_MAC_COPY: "$$mdi:content-copy$$"
    KC_MAC_PASTE: "$$mdi:content-paste$$"
    # System / misc
    MAC_DND: "$$mdi:bell-off$$"
    MAC_LOCK: "$$mdi:lock$$"
    LUMINO: "$$mdi:led-on$$"
    KC_MS_JIGGLER_TOGGLE: "$$mdi:rodent$$"
    CW_TOGG: "$$mdi:apple-keyboard-caps$$"
    QK_BOOT: "$$mdi:progress-download$$"
    # Media / audio
    KC_MEDIA_PLAY_PAUSE: "$$mdi:play-pause$$"
    KC_AUDIO_MUTE: "$$mdi:volume-off$$"
    KC_AUDIO_VOL_UP: "$$mdi:volume-high$$"
    KC_AUDIO_VOL_DOWN: "$$mdi:volume-low$$"
    KC_MEDIA_NEXT_TRACK: "$$mdi:skip-forward$$"
    KC_MEDIA_PREV_TRACK: "$$mdi:skip-backward$$"
    # RGB matrix (PaletteFx)
    RM_NEXT: "EFFECT →"
    RM_PREV: "EFFECT ←"
    RM_HUEU: "PALETTE →"
    RM_HUED: "PALETTE ←"
    KC_F14: "$$mdi:brightness-5$$"
    KC_F15: "$$mdi:brightness-7$$"
    RM_SPDU: "$$mdi:speedometer$$"
    RM_SPDD: "$$mdi:speedometer-slow$$"
    # Mouse keys
    MS_UP: "🖱↑"
    MS_DOWN: "🖱↓"
    MS_LEFT: "🖱←"
    MS_RGHT: "🖱→"
    MS_BTN1: "$$mdi:mouse-left-click$$"
    MS_BTN2: "$$mdi:mouse-right-click$$"
    MS_BTN3: "$$mdi:mouse-scroll-wheel$$"
    MS_BTN4: "$$mdi:page-previous$$"
    MS_BTN5: "$$mdi:page-next$$"
    MS_WHLU: "$$mdi:gesture-swipe-up$$"
    MS_WHLD: "$$mdi:gesture-swipe-down$$"
    MS_WHLL: "$$mdi:gesture-swipe-left$$"
    MS_WHLR: "$$mdi:gesture-swipe-right$$"
    MS_ACL0: "$$mdi:speedometer-slow$$"
    MS_ACL1: "$$mdi:speedometer-medium$$"
    MS_ACL2: "$$mdi:speedometer$$"
    # Arrows & navigation
    KC_UP: $$mdi:arrow-up-bold$$
    KC_DOWN: $$mdi:arrow-down-bold$$
    KC_LEFT: $$mdi:arrow-left-bold$$
    KC_RIGHT: $$mdi:arrow-right-bold$$
    # Basic keys
    KC_SPACE: "$$mdi:keyboard-space$$"
    KC_BSPC: "$$mdi:backspace$$"
    KC_DEL: "$$mdi:backspace-reverse$$"
    KC_DELETE: "$$mdi:backspace-reverse$$"
    KC_ENTER: "$$mdi:keyboard-return$$"
    KC_ESC: "$$mdi:keyboard-esc$$"
    KC_TAB: "$$mdi:keyboard-tab$$"
    KC_NO: ""
    # Symbols / punctuation
    KC_KP_MINUS: "-"
    KC_KP_PLUS: "+"
    KC_KP_EQUAL: "="
    KC_KP_COMMA: ","
    KC_KP_DOT: "."
    KC_MINUS: { t: "-", s: "_" }
    KC_EQUAL: { t: "=", s: "+" }
    KC_GRAVE: { t: "`", s: "~" }

draw_config:
  append_colon_to_layer_header: false
  dark_mode: auto
  footer_text: "ZSA Voyager - Alex Krupa"
  shrink_wide_legends: 5
