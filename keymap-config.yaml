# Friendly labels for custom keycodes that keymap-drawer can't auto-detect.
parse_config:
  preprocess: true
  skip_binding_parsing: false
  sticky_label: sticky
  toggle_label: $$mdi:toggle-switch$$
  trans_legend:
    t: ▽
    type: trans
  layer_names:
    - BASE
    - NAV
    - NUM
    - SYM
    - MOUSE
    - SYS
  raw_binding_map:
    # Thumbs: LT() layer-tap, hold = layer, tap = key
    TMB_BSP: { t: "⌫", h: "NAV" }
    TMB_ESC: { t: "Esc", h: "NUM" }
    TMB_ENT: { t: "↵", h: "SYM" }
    TMB_SPC: { t: "␣", h: "MOUSE" }
    # Dual-function numpad keys: tap = digit/symbol, hold = F-key
    # (LT() layer placeholders are overridden in process_record_user)
    DF_0_F11:    { t: "0", h: F11 }
    DF_1_F1:     { t: "1", h: F1 }
    DF_2_F2:     { t: "2", h: F2 }
    DF_3_F3:     { t: "3", h: F3 }
    DF_4_F4:     { t: "4", h: F4 }
    DF_5_F5:     { t: "5", h: F5 }
    DF_6_F6:     { t: "6", h: F6 }
    DF_7_F7:     { t: "7", h: F7 }
    DF_8_F8:     { t: "8", h: F8 }
    DF_9_F9:     { t: "9", h: F9 }
    DF_ASTR_F12: { t: "*", h: F12 }
    DF_SLS_F10:  { t: "/", h: F10 }
    # Layer 1 mod-taps: modifier on hold, macOS shortcut on tap
    MT_GUI_SA: { t: "Select All", h: "LGUI" }
    MT_ALT_DL: { t: "⌘⌫",       h: "LALT" }
    MT_SFT_FD: { t: "Find",       h: "LSFT" }
    # HRM
    HRM_A: { t: "A", h: "LGUI" }
    HRM_S: { t: "S", h: "LCTL" }
    HRM_D: { t: "D", h: "LALT" }
    HRM_F: { t: "F", h: "LSFT" }
    HRM_J: { t: "J", h: "RSFT" }
    HRM_K: { t: "K", h: "LALT" }
    HRM_L: { t: "L", h: "RCTL" }
    HRM_QUO: { t: '''"', h: "RGUI" }
    # BRM
    BRM_Z: { t: "Z", h: "HYPER" }
    BRM_X: { t: "X", h: "MEH" }
    BRM_C: { t: "C", h: "RALT" }
    BRM_V: { t: "V", h: "SYM" }
    BRM_M: { t: "M", h: "SYM" }
    BRM_COM: { t: ",;", h: "RALT" }
    BRM_DOT: { t: ".:", h: "MEH" }
    BRM_SLS: { t: "/?", h: "HYPER" }
    BRM_ASTR: { t: "*!", h: "SYS" }
    # Macros
    MCR_ARR: "-> "
    MCR_DLR_BRC: "${}"
    # Shortcut aliases
    SEL_ALL: "Select All"
    MAC_QUIT: Quit
    TAB_CLS: "Tab ✕"
    TAB_PRV: "Tab ←"
    TAB_NXT: "Tab →"
    TAB_OPN: "Tab +"
    MAC_FIND: Find
    CYCLOTAB: "⌘Tab"
    MAC_DEL: "⌘⌫"
    # System keys
    MAC_DND: "DND"
    MAC_LOCK: "Lock"
    LUMINO: "Lights"
    KC_MS_JIGGLER_TOGGLE: "Jiggler"
    KC_MAC_UNDO: "Undo"
    KC_MAC_CUT: "Cut"
    KC_MAC_COPY: "Copy"
    KC_MAC_PASTE: "Paste"
    CW_TOGG: "CapsWord"
    QK_BOOT: "Bootloader"
    RGB_SLD: "Solid"
    # Media / audio
    KC_MEDIA_PLAY_PAUSE: "▶ ⏸"
    KC_AUDIO_MUTE: "Mute"
    KC_AUDIO_VOL_UP: "Vol +"
    KC_AUDIO_VOL_DOWN: "Vol −"
    KC_MEDIA_NEXT_TRACK: "Track ⏭"
    KC_MEDIA_PREV_TRACK: "Track ⏮"
    # RGB matrix (PaletteFx)
    RM_NEXT: "Effect →"
    RM_PREV: "Effect ←"
    RM_HUEU: "Palette →"
    RM_HUED: "Palette ←"
    RM_SATU: "Sat +"
    RM_SATD: "Sat −"
    RM_VALU: "Bright +"
    RM_VALD: "Bright −"
    RM_SPDU: "Speed +"
    RM_SPDD: "Speed −"
    # Mouse keys
    MS_UP:   "🖱 ↑"
    MS_DOWN: "🖱 ↓"
    MS_LEFT: "🖱 ←"
    MS_RGHT: "🖱 →"
    MS_BTN1: "L click"
    MS_BTN2: "R click"
    MS_BTN3: "M click"
    MS_BTN4: "Back"
    MS_BTN5: "Fwd"
    MS_WHLU: "Wheel ↑"
    MS_WHLD: "Wheel ↓"
    MS_WHLL: "Wheel ←"
    MS_WHLR: "Wheel →"
    MS_ACL0: "Slow"
    MS_ACL1: "Med"
    MS_ACL2: "Fast"
    KC_KP_MINUS: "-"
    # Other
    XXXXXXX: ""
    "NO": ""
    MINUS: "-"
    MINS: "-"
    EQUAL: "="
    EQL: "="
    LEFT_BRACKET: "["
    LBRC: "["
    RIGHT_BRACKET: "]"
    RBRC: "]"
    BACKSLASH: \
    BSLS: \
    NONUS_HASH: "#"
    NUHS: "#"
    SEMICOLON: ;
    SCLN: ;
    QUOTE: "'"
    QUOT: "'"
    GRAVE: "`"
    GRV: "`"
    COMMA: ","
    COMM: ","
    DOT: .
    SLASH: /
    SLSH: /
    TILDE: "~"
    TILD: "~"
    EXCLAIM: "!"
    EXLM: "!"
    AT: "@"
    HASH: "#"
    DOLLAR: $
    DLR: $
    PERCENT: "%"
    PERC: "%"
    CIRCUMFLEX: ^
    CIRC: ^
    AMPERSAND: "&"
    AMPR: "&"
    ASTERISK: "*"
    ASTR: "*"
    LEFT_PAREN: (
    LPRN: (
    RIGHT_PAREN: )
    RPRN: )
    UNDERSCORE: _
    UNDS: _
    PLUS: +
    LEFT_CURLY_BRACE: "{"
    LCBR: "{"
    RIGHT_CURLY_BRACE: "}"
    RCBR: "}"
    PIPE: "|"
    COLON: ":"
    COLN: ":"
    DOUBLE_QUOTE: '"'
    DQUO: '"'
    DQT: '"'
    LEFT_ANGLE_BRACKET: <
    LABK: <
    LT: <
    RIGHT_ANGLE_BRACKET: ">"
    RABK: ">"
