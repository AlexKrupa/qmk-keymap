# Friendly labels for custom keycodes that keymap-drawer can't auto-detect.
parse_config:
  preprocess: true
  skip_binding_parsing: false
  sticky_label: sticky
  toggle_label: $$mdi:toggle-switch$$
  trans_legend:
    t: ▽
    type: trans
  layer_names:
    - BASE
    - NAV
    - NUM
    - SYM
    - MOUSE
    - SYS
  raw_binding_map:
    # Thumbs: LT() layer-tap, hold = layer, tap = key
    TMB_BSP: { t: "$$mdi:backspace$$", h: "NAV" }
    TMB_ESC: { t: "$$mdi:keyboard-esc$$", h: "NUM" }
    TMB_ENT: { t: "$$mdi:keyboard-return$$", h: "SYM" }
    TMB_SPC: { t: "$$mdi:keyboard-space$$", h: "MOUSE" }
    # Dual-function numpad keys: tap = digit/symbol, hold = F-key
    # (LT() layer placeholders are overridden in process_record_user)
    DF_0_F11: { t: "0", h: F11 }
    DF_1_F1: { t: "1", h: F1 }
    DF_2_F2: { t: "2", h: F2 }
    DF_3_F3: { t: "3", h: F3 }
    DF_4_F4: { t: "4", h: F4 }
    DF_5_F5: { t: "5", h: F5 }
    DF_6_F6: { t: "6", h: F6 }
    DF_7_F7: { t: "7", h: F7 }
    DF_8_F8: { t: "8", h: F8 }
    DF_9_F9: { t: "9", h: F9 }
    DF_ASTR_F12: { t: "*", h: F12 }
    DF_SLS_F10: { t: "/", h: F10 }
    # Layer 1 mod-taps: modifier on hold, macOS shortcut on tap
    MT_GUI_SA: { t: "Select All", h: "$$mdi:apple-keyboard-command$$" }
    MT_ALT_DL: { t: "⌘⌫", h: "$$mdi:apple-keyboard-option$$" }
    MT_SFT_FD: { t: "Find", h: "$$mdi:apple-keyboard-shift$$" }
    # Home-row mods (HRM)
    HRM_A: { t: "A", h: "$$mdi:apple-keyboard-command$$" }
    HRM_S: { t: "S", h: "$$mdi:apple-keyboard-control$$" }
    HRM_D: { t: "D", h: "$$mdi:apple-keyboard-option$$" }
    HRM_F: { t: "F", h: "$$mdi:apple-keyboard-shift$$" }
    HRM_J: { t: "J", h: "$$mdi:apple-keyboard-shift$$" }
    HRM_K: { t: "K", h: "$$mdi:apple-keyboard-option$$" }
    HRM_L: { t: "L", h: "$$mdi:apple-keyboard-control$$" }
    HRM_QUO: { t: '''"', h: "$$mdi:apple-keyboard-command$$" }
    # Bottom-row mods (BRM)
    BRM_Z: { t: "Z", h: "HYPER" }
    BRM_X: { t: "X", h: "MEH" }
    BRM_C: { t: "C", h: "R⌥" }
    BRM_V: { t: "V", h: "SYM" }
    BRM_M: { t: "M", h: "SYM" }
    BRM_COM: { t: ",;", h: "R⌥" }
    BRM_DOT: { t: ".:", h: "MEH" }
    BRM_SLS: { t: "/?", h: "HYPER" }
    BRM_ASTR: { t: "*!", h: "SYS" }
    # Plain modifiers (used on NUM layer)
    KC_LEFT_CTRL: "$$mdi:apple-keyboard-control$$"
    KC_LEFT_GUI: "$$mdi:apple-keyboard-command$$"
    KC_LEFT_ALT: "$$mdi:apple-keyboard-option$$"
    KC_LEFT_SHIFT: "$$mdi:apple-keyboard-shift$$"
    KC_RIGHT_CTRL: "$$mdi:apple-keyboard-control$$"
    KC_RIGHT_GUI: "$$mdi:apple-keyboard-command$$"
    KC_RIGHT_ALT: "R⌥"
    KC_RIGHT_SHIFT: "$$mdi:apple-keyboard-shift$$"
    # Text macros
    MCR_ARR: "-> "
    MCR_DLR_BRC: "${}"
    MCR_HOME: "~/"
    MCR_MDCODE: "```\n\n```"
    MCR_VQ: ":q!"
    MCR_VW: ":w"
    MCR_VWQ: ":wq"
    # macOS shortcut aliases
    SEL_ALL: "Select All"
    MAC_FIND: Find
    MAC_QUIT: Quit
    MAC_DEL: "⌘⌫"
    CYCLOTAB: "⌘Tab"
    TAB_OPN: "Tab +"
    TAB_CLS: "Tab ✕"
    TAB_PRV: "Tab ←"
    TAB_NXT: "Tab →"
    KC_MAC_UNDO: "↶ Undo"
    KC_MAC_CUT: "Cut"
    KC_MAC_COPY: "Copy"
    KC_MAC_PASTE: "Paste"
    # System / misc
    MAC_DND: "DND"
    MAC_LOCK: "$$mdi:lock$$"
    LUMINO: "Lights"
    KC_MS_JIGGLER_TOGGLE: "Jiggler"
    CW_TOGG: "⇪ CapsWord"
    QK_BOOT: "$$mdi:progress-download$$ Boot"
    RGB_SLD: "▪ Solid"
    # Media / audio
    KC_MEDIA_PLAY_PAUSE: "$$mdi:play-pause$$"
    KC_AUDIO_MUTE: "$$mdi:volume-off$$"
    KC_AUDIO_VOL_UP: "$$mdi:volume-high$$"
    KC_AUDIO_VOL_DOWN: "$$mdi:volume-low$$"
    KC_MEDIA_NEXT_TRACK: "$$mdi:skip-next$$"
    KC_MEDIA_PREV_TRACK: "$$mdi:skip-previous$$"
    # RGB matrix (PaletteFx)
    RM_NEXT: "Effect→"
    RM_PREV: "Effect←"
    RM_HUEU: "Palette→"
    RM_HUED: "Palette←"
    RM_SATU: "Sat+"
    RM_SATD: "Sat−"
    RM_VALU: "$$mdi:brightness-5$$"
    RM_VALD: "$$mdi:brightness-7$$"
    RM_SPDU: "Speed+"
    RM_SPDD: "Speed−"
    # Mouse keys
    MS_UP: "🖱↑"
    MS_DOWN: "🖱↓"
    MS_LEFT: "🖱←"
    MS_RGHT: "🖱→"
    MS_BTN1: "L click"
    MS_BTN2: "R click"
    MS_BTN3: "M click"
    MS_BTN4: "Back"
    MS_BTN5: "Fwd"
    MS_WHLU: "Wheel ↑"
    MS_WHLD: "Wheel ↓"
    MS_WHLL: "Wheel ←"
    MS_WHLR: "Wheel →"
    MS_ACL0: "Slow"
    MS_ACL1: "Med"
    MS_ACL2: "Fast"
    # Arrows & navigation
    KC_UP: $$mdi:arrow-up-bold$$
    KC_DOWN: $$mdi:arrow-down-bold$$
    KC_LEFT: $$mdi:arrow-left-bold$$
    KC_RIGHT: $$mdi:arrow-right-bold$$
    KC_DELETE: "⌦"
    # Basic keys
    KC_SPACE: "$$mdi:keyboard-space$$"
    KC_BSPC: "$$mdi:backspace$$"
    KC_DEL: "$$mdi:backspace-reverse$$"
    KC_ENTER: $$mdi:keyboard-return$$
    KC_ESC: $$mdi:keyboard-esc$$
    KC_TAB: $$mdi:keyboard-tab$$
    XXXXXXX: ""
    "NO": ""
    # Symbols / punctuation
    KC_KP_MINUS: "-"
    MINUS: "-"
    MINS: "-"
    EQUAL: "="
    EQL: "="
    LEFT_BRACKET: "["
    LBRC: "["
    RIGHT_BRACKET: "]"
    RBRC: "]"
    BACKSLASH: \
    BSLS: \
    NONUS_HASH: "#"
    NUHS: "#"
    SEMICOLON: ;
    SCLN: ;
    QUOTE: "'"
    QUOT: "'"
    GRAVE: "`"
    GRV: "`"
    COMMA: ","
    COMM: ","
    DOT: .
    SLASH: /
    SLSH: /
    TILDE: "~"
    TILD: "~"
    EXCLAIM: "!"
    EXLM: "!"
    AT: "@"
    HASH: "#"
    DOLLAR: $
    DLR: $
    PERCENT: "%"
    PERC: "%"
    CIRCUMFLEX: ^
    CIRC: ^
    AMPERSAND: "&"
    AMPR: "&"
    ASTERISK: "*"
    ASTR: "*"
    LEFT_PAREN: (
    LPRN: (
    RIGHT_PAREN: )
    RPRN: )
    UNDERSCORE: _
    UNDS: _
    PLUS: +
    LEFT_CURLY_BRACE: "{"
    LCBR: "{"
    RIGHT_CURLY_BRACE: "}"
    RCBR: "}"
    PIPE: "|"
    COLON: ":"
    COLN: ":"
    DOUBLE_QUOTE: '"'
    DQUO: '"'
    DQT: '"'
    LEFT_ANGLE_BRACKET: <
    LABK: <
    LT: <
    RIGHT_ANGLE_BRACKET: ">"
    RABK: ">"
    GT: ">"
    QUESTION: "?"
    QUES: "?"

draw_config:
  append_colon_to_layer_header: false
  dark_mode: auto
  footer_text: "ZSA Voyager - alexkrupa"
  shrink_wide_legends: 6

# Combos can't be parsed from keymap.c (qmk c2json limitation) - maintain here.
# p: key positions (0-indexed per LAYOUT_voyager matrix order)
#    0-11 top row, 12-23 row 2, 24-35 home row, 36-47 bottom row, 48-49 L thumbs, 50-51 R thumbs
combos:
  - p: [13, 14] # Q + W
    k: Tab
    l: [BASE]
    a: top
